<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduRyday - 로그인</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .placeholder { background: #e5e7eb; border: 2px dashed #9ca3af; }
    .wireframe-text { color: #6b7280; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="w-12 h-12 placeholder rounded-lg mx-auto mb-4 flex items-center justify-center">
        <span class="wireframe-text text-xs">Logo</span>
      </div>
      <h1 class="text-2xl font-bold wireframe-text">EduRyday</h1>
      <p class="wireframe-text text-sm mt-2">AI 기반 통합 교육 플랫폼</p>
    </div>

    <!-- Login Card -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8">
      <h2 class="text-xl font-bold wireframe-text mb-6 text-center">로그인</h2>

      <!-- Email Input -->
      <div class="mb-4">
        <label class="block wireframe-text text-sm font-medium mb-2">이메일</label>
        <input
          type="email"
          placeholder="example@kookmin.ac.kr"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg wireframe-text"
        >
      </div>

      <!-- Password Input -->
      <div class="mb-6">
        <label class="block wireframe-text text-sm font-medium mb-2">비밀번호</label>
        <input
          type="password"
          placeholder="••••••••"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg wireframe-text"
        >
        <div class="text-right mt-2">
          <a href="#" class="text-sm wireframe-text hover:underline">비밀번호 찾기</a>
        </div>
      </div>

      <!-- Login Button -->
      <button class="w-full py-3 bg-gray-800 text-white rounded-lg font-medium mb-6">
        로그인
      </button>

      <!-- Divider -->
      <div class="flex items-center gap-4 mb-6">
        <div class="flex-1 h-px bg-gray-200"></div>
        <span class="wireframe-text text-sm">또는</span>
        <div class="flex-1 h-px bg-gray-200"></div>
      </div>

      <!-- Social Login -->
      <div class="space-y-3">
        <button class="w-full py-3 border border-gray-300 rounded-lg wireframe-text flex items-center justify-center gap-3">
          <div class="w-5 h-5 placeholder rounded"></div>
          Google로 계속하기
        </button>
        <button class="w-full py-3 border border-gray-300 rounded-lg wireframe-text flex items-center justify-center gap-3">
          <div class="w-5 h-5 placeholder rounded"></div>
          학교 계정으로 로그인
        </button>
      </div>
    </div>

    <!-- Sign Up Link -->
    <p class="text-center wireframe-text mt-6">
      계정이 없으신가요?
      <a href="#" class="font-medium text-gray-800 hover:underline">회원가입</a>
    </p>
  </div>
</body>
</html>
